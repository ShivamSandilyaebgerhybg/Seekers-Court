<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekers Court</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>⚖️ Seekers Court</h1>

        <p class="tagline">
            One Question. Many Minds. Better Decisions.
        </p>

        <p class="subtitle">
            A Multi-Agent Reasoning System for Decision Support
        </p>

        <div class="architecture">

            <h3>Agent Architecture</h3>

            <ul>
                <li>🧠 Philosopher Agent</li>
                <li>⚔️ Strategist Agent</li>
                <li>🚀 Entrepreneur Agent</li>
                <li>⚖️ Verdict Synthesizer</li>
            </ul>

        </div>

        <textarea
            id="question"
            placeholder="Present your dilemma before the Court..."
        ></textarea>

        <div class="advisors">
            <label>
                <input type="checkbox" value="Philosopher" checked>
                Philosopher
            </label>

            <label>
                <input type="checkbox" value="Strategist" checked>
                Strategist
            </label>

            <label>
                <input type="checkbox" value="Entrepreneur" checked>
                Entrepreneur
            </label>
        </div>

        <button onclick="conveneCourt()">
            Convene the Court
        </button>

        <div id="loading"></div>

        <div id="agentStatus"></div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
